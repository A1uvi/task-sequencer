<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
  <div style="background: #3b82f6; padding: 20px; border-radius: 8px 8px 0 0;">
    <h1 style="color: white; margin: 0; font-size: 24px;">Task Completed</h1>
  </div>
  <div style="background: #fff; border: 1px solid #e5e7eb; padding: 24px; border-radius: 0 0 8px 8px;">
    <p>Your task has finished executing successfully.</p>
    <table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
      <tr>
        <td style="padding: 8px; color: #6b7280; width: 140px;">Task Execution ID</td>
        <td style="padding: 8px;"><code>{{ task_execution_id }}</code></td>
      </tr>
      <tr style="background: #f9fafb;">
        <td style="padding: 8px; color: #6b7280;">Status</td>
        <td style="padding: 8px;"><span style="background: #d1fae5; color: #065f46; padding: 2px 8px; border-radius: 4px; font-size: 14px;">Completed</span></td>
      </tr>
    </table>
    <p>Log in to view the full output and conversation log.</p>
    <p style="color: #6b7280; font-size: 14px; margin-top: 32px;">AI Workflow Platform — Automated Notification</p>
  </div>
</body>
</html>
